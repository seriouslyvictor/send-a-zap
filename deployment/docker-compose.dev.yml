name: send-a-zap-dev

# Local development mirrors the target VPS topology: this project owns only
# Next.js and n8n. PostgreSQL and Evolution Go are shared services running on
# the host and are reached from Docker through host.docker.internal.
services:
  n8n:
    container_name: send_a_zap_n8n_dev
    image: docker.n8n.io/n8nio/n8n:2.30.5
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: host.docker.internal
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT:-5432}
      DB_POSTGRESDB_DATABASE: n8n_send_a_zap
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TIMEZONE:-America/Sao_Paulo}
      TZ: ${TIMEZONE:-America/Sao_Paulo}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data_dev:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nextjs:
    container_name: send_a_zap_nextjs_dev
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: node deployment/start-nextjs-dev.mjs
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_WEBHOOK_URL: http://n8n:5678
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://host.docker.internal:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:3000/api/webhooks/evolution}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      TURBOPACK_USE_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../:/app
      - nextjs_node_modules_dev:/app/node_modules
      - nextjs_build_dev:/app/.next
    depends_on:
      n8n:
        condition: service_healthy

volumes:
  n8n_data_dev:
  nextjs_node_modules_dev:
  nextjs_build_dev:
