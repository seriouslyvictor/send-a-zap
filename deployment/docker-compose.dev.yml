name: send-a-zap-dev

# Local development mirrors the target VPS topology: this project owns
# Next.js, the BullMQ campaign worker, and Redis. PostgreSQL and Evolution Go
# are shared services running on the host and are reached from Docker through
# host.docker.internal.
services:
  redis:
    container_name: send_a_zap_redis_dev
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    container_name: send_a_zap_nextjs_dev
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: node deployment/start-nextjs-dev.mjs
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://host.docker.internal:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:3000/api/webhooks/evolution}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      TURBOPACK_USE_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      PNPM_CONFIG_STORE_DIR: /pnpm-store
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../:/app
      - nextjs_node_modules_dev:/app/node_modules
      - nextjs_build_dev:/app/.next
      - nextjs_pnpm_store_dev:/pnpm-store
    depends_on:
      redis:
        condition: service_healthy

  worker:
    container_name: send_a_zap_worker_dev
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "corepack enable pnpm && pnpm install --frozen-lockfile && pnpm run worker"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:${POSTGRES_PORT:-5432}/send_a_zap?schema=public
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://host.docker.internal:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      QUEUE_DASHBOARD_HOST: ${QUEUE_DASHBOARD_HOST:-127.0.0.1}
      QUEUE_DASHBOARD_PORT: ${QUEUE_DASHBOARD_PORT:-3001}
      QUEUE_DASHBOARD_USERNAME: ${QUEUE_DASHBOARD_USERNAME:-admin}
      QUEUE_DASHBOARD_PASSWORD: ${QUEUE_DASHBOARD_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../:/app
      - nextjs_node_modules_dev:/app/node_modules
      - nextjs_pnpm_store_dev:/pnpm-store
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data_dev:
  nextjs_node_modules_dev:
  nextjs_build_dev:
  nextjs_pnpm_store_dev:
