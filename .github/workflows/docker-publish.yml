name: Build & Push Docker Image

on:
  # Only run after CI passes
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

  # Also allow manual triggers for emergency deployments
  workflow_dispatch:

  # Keep tag-based triggers for versioned releases
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest

    # Only run if CI passed (or on manual trigger/tag push)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: seriouslyvictor/whatsapp-nextjs
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=WhatsApp Automation
            org.opencontainers.image.description=Next.js WhatsApp automation with Evolution API
            org.opencontainers.image.vendor=SeriouslyVictor

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            DATABASE_URL=postgresql://build:build@localhost:5432/build?schema=public
            BUILDTIME=${{ github.event.repository.updated_at }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=seriouslyvictor/whatsapp-nextjs:buildcache
          cache-to: type=registry,ref=seriouslyvictor/whatsapp-nextjs:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: seriouslyvictor/whatsapp-nextjs:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            Docker image: `docker pull seriouslyvictor/whatsapp-nextjs:${{ steps.meta.outputs.version }}`
